name: Generate Snake Animation

on:
  # Her 24 saatte bir otomatik çalışır
  schedule:
    - cron: "0 0 * * *" 
  
  # Action'ı manuel olarak tetiklemene olanak tanır
  workflow_dispatch:
  
  # Ana dala her push yapıldığında çalışır
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Yılan animasyonunu oluşturan action
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Çıktı olarak hem aydınlık hem de karanlık tema için SVG dosyalarını belirliyoruz
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Oluşturulan dosyaları 'output' adında bir branch'e (dala) push eder
      - name: Push to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
